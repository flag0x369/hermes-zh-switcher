<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Zh Switcher before and after UI effect comparison</title>
  <desc id="desc">A dark before and after comparison showing Hermes Desktop English settings and tools UI becoming readable Chinese after installing Hermes Zh Switcher.</desc>
  <defs>
    <linearGradient id="pageGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.56" stop-color="#08111f"/>
      <stop offset="1" stop-color="#0b2f24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.48" stop-color="#34d399"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="afterFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08251b"/>
      <stop offset="1" stop-color="#0d3b2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="34" fill="#080d17"/>
  <rect x="48" y="36" width="1504" height="792" rx="40" fill="url(#pageGlow)"/>
  <rect x="96" y="86" width="1408" height="664" rx="34" fill="#0b1220" stroke="#263854" stroke-width="2"/>
  <rect x="96" y="64" width="1408" height="6" fill="url(#accent)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="146" y="148" fill="#f3f4f6" font-size="52" font-weight="800">Hermes Zh Switcher</text>
    <text x="146" y="202" fill="#a7f3d0" font-size="29" font-weight="800">让 Hermes 设置、技能和工具界面中文可读</text>
    <text x="146" y="250" fill="#a8b4c8" font-size="23">A reversible Chinese UI layer for the daily Hermes Desktop workflow.</text>

    <g filter="url(#shadow)">
      <rect x="134" y="298" width="610" height="398" rx="24" fill="#101827" stroke="#33435e" stroke-width="2"/>
      <text x="170" y="350" fill="#fca5a5" font-size="22" font-weight="800">Before install</text>
      <text x="170" y="394" fill="#f8fafc" font-size="29" font-weight="850">English-heavy workflow</text>
      <text x="170" y="430" fill="#a8b4c8" font-size="19">Chinese users must scan settings and tool labels in English.</text>

      <line x1="170" y1="462" x2="708" y2="462" stroke="#33435e" stroke-width="2"/>

      <text x="170" y="506" fill="#f8fafc" font-size="24" font-weight="850">Settings</text>
      <text x="170" y="538" fill="#a8b4c8" font-size="20" font-weight="650">Search settings...</text>
      <text x="170" y="578" fill="#f8fafc" font-size="24" font-weight="850">Skills &amp; Tools</text>
      <text x="170" y="610" fill="#a8b4c8" font-size="20" font-weight="650">Send follow-up</text>
      <text x="170" y="650" fill="#f8fafc" font-size="24" font-weight="850">Gateway Connection</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="856" y="298" width="610" height="398" rx="24" fill="url(#afterFill)" stroke="#2f7654" stroke-width="2"/>
      <text x="892" y="350" fill="#86efac" font-size="22" font-weight="800">After install</text>
      <text x="892" y="394" fill="#f8fafc" font-size="29" font-weight="850">中文界面直接进入工作状态</text>
      <text x="892" y="430" fill="#9cf7c8" font-size="19" font-weight="700">设置、技能、工具和状态说明变得一眼可读。</text>

      <line x1="892" y1="462" x2="1430" y2="462" stroke="#347f5e" stroke-width="2"/>

      <text x="892" y="506" fill="#f8fafc" font-size="24" font-weight="850">设置</text>
      <text x="892" y="538" fill="#9cf7c8" font-size="20" font-weight="750">搜索设置...</text>
      <text x="892" y="578" fill="#f8fafc" font-size="24" font-weight="850">技能与工具</text>
      <text x="892" y="610" fill="#9cf7c8" font-size="20" font-weight="750">发送后续消息</text>
      <text x="892" y="650" fill="#f8fafc" font-size="24" font-weight="850">网关连接</text>

      <rect x="1324" y="332" width="88" height="44" rx="22" fill="#123326" stroke="#45b678" stroke-width="2"/>
      <text x="1368" y="362" fill="#bbf7d0" font-size="18" font-weight="900" text-anchor="middle">中 / EN</text>
    </g>

    <g font-size="18" font-weight="850">
      <rect x="146" y="720" width="218" height="44" rx="22" fill="#172338" stroke="#3b4d6c"/>
      <text x="174" y="749" fill="#c7d2fe">Reversible patch</text>

      <rect x="386" y="720" width="218" height="44" rx="22" fill="#123326" stroke="#2f7654"/>
      <text x="415" y="749" fill="#a7f3d0">Backup restore</text>

      <rect x="626" y="720" width="190" height="44" rx="22" fill="#172338" stroke="#3b4d6c"/>
      <text x="655" y="749" fill="#fde68a">No user data</text>

      <rect x="838" y="720" width="260" height="44" rx="22" fill="#123326" stroke="#2f7654"/>
      <text x="870" y="749" fill="#bbf7d0">Keeps API/MCP terms</text>
    </g>
  </g>
</svg>
